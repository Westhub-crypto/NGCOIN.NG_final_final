<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NGCoin</title>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag SDK -->
  <script src="//libtl.com/sdk.js" data-zone="10677338" data-sdk="show_10677338"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .coin {
      font-size: 40px;
      margin: 20px;
    }

    .tap-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: gold;
      border: none;
      font-size: 22px;
      font-weight: bold;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h2>NGCoin Mini App</h2>

<div class="coin" id="coins">0</div>

<button class="tap-btn" onclick="tap()">TAP</button>
<br>
<button onclick="watchAd()">Watch Rewarded Ad</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;

  if (!user) {
    document.body.innerHTML = "<h3>Please open inside Telegram</h3>";
  }

  const telegram_id = user?.id;

  const coinEl = document.getElementById("coins");

  async function tap(ad = false) {
    const res = await fetch("/api/tap", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ telegram_id })
    });

    const data = await res.json();

    if (data.success) {
      coinEl.innerText = data.coins;
    } else {
      alert(data.error);
    }
  }

  function watchAd() {
    show_10677338().then(() => {
      tap(true);
    });
  }
</script>

</body>
</html>
