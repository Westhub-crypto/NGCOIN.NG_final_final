<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NGCoin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:Arial;
}
#coin{
  width:200px;
  margin-top:20px;
  cursor:pointer;
}
button{
  padding:8px 14px;
  background:#2563eb;
  border:none;
  border-radius:6px;
  color:white;
  margin:5px;
}
</style>
</head>
<body>

<h2>NGCoin Tap To Earn</h2>

<div id="balance">Coins: 0</div>
<div id="energy">Energy: 1000</div>

<img src="https://i.imgur.com/9z3sF6K.png" id="coin">

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const telegram_id = tg.initDataUnsafe.user?.id;
const username = tg.initDataUnsafe.user?.username;

let coins = 0;
let energy = 1000;

async function register(){
 const res = await fetch("/api/user/auth",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({telegram_id, username})
 });
 const data = await res.json();
 coins = data.coins;
 energy = data.energy;
 updateUI();
}

async function mine(){
 const res = await fetch("/api/user/mine",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({telegram_id})
 });
 const data = await res.json();
 if(!data.error){
  coins = data.coins;
  energy = data.energy;
  updateUI();
 }
}

function updateUI(){
 document.getElementById("balance").innerText = "Coins: " + coins;
 document.getElementById("energy").innerText = "Energy: " + energy;
}

document.getElementById("coin").addEventListener("click", mine);

register();
</script>

</body>
</html>
