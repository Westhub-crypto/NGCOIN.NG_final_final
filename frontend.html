<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGCoin Mini App</title>
<script src="//libtl.com/sdk.js" data-zone="10677338" data-sdk="show_10677338"></script>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
  #progressContainer { width: 100%; background: #ddd; border-radius: 10px; overflow: hidden; height: 20px; display: none; margin-top: 10px; }
  #progressBar { width: 0%; height: 100%; background: #4caf50; }
  button { margin: 5px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h1>NGCoin Mini App</h1>
<p>Coins: <span id="coins">0</span></p>
<p>Balance: ₦<span id="balance">0</span></p>

<button id="tapBtn">Tap to Mine</button>
<button id="rewardBtn">Watch Reward Ad</button>
<button id="withdrawBtn">Withdraw</button>

<div id="progressContainer"><div id="progressBar"></div></div>

<script>
const coinsEl = document.getElementById("coins");
const balanceEl = document.getElementById("balance");
const tapBtn = document.getElementById("tapBtn");
const rewardBtn = document.getElementById("rewardBtn");
const withdrawBtn = document.getElementById("withdrawBtn");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");

// Replace with actual logged-in user's telegram_id
const TELEGRAM_ID = "user_telegram_id";

// Helper Functions
function updateCoins(coins, balance) { coinsEl.textContent = coins; balanceEl.textContent = balance.toFixed(2); }
function showConfetti() { console.log("🎉 Confetti!"); }

// TAP SYSTEM
tapBtn.addEventListener("click", async () => {
  try {
    const resp = await fetch("/api/tap", {
      method: "POST",
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: TELEGRAM_ID })
    });
    const data = await resp.json();
    if(data.success) {
      updateCoins(data.coins, data.balance);
      alert(`✅ Coins: ${data.coins}\nProjected Daily: ${data.projection.daily}`);
    } else alert("⚠️ " + (data.error || "Tap failed"));
  } catch(e) { console.error(e); }
});

// REWARDED INTERSTITIAL
rewardBtn.addEventListener("click", () => {
  progressContainer.style.display = "block";
  progressBar.style.width = "0%";

  let progress = 0;
  const step = 0.5;
  const intervalTime = 25;
  const interval = setInterval(() => {
    progress += step;
    if(progress > 100) progress = 100;
    progressBar.style.width = progress + "%";
  }, intervalTime);

  show_10677338().then(async () => {
    clearInterval(interval);
    progressBar.style.width = "100%";
    setTimeout(() => { progressContainer.style.display = "none"; }, 300);

    const res = await fetch("/api/tap", {
      method: "POST",
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: TELEGRAM_ID })
    });
    const data = await res.json();
    if(data.success) updateCoins(data.coins + 50, data.balance);
    showConfetti();
    alert("✅ Reward ad completed! Coins added.");
  }).catch(e => {
    clearInterval(interval);
    progressContainer.style.display = "none";
    console.error("Ad error:", e);
    alert("⚠️ Ad failed or skipped.");
  });
});

// IN-APP INTERSTITIAL
async function showInAppInterstitial() {
  try {
    await show_10677338({
      type: 'inApp',
      inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }
    });
    showConfetti();
    alert("✅ In-App ad shown!");
  } catch(e) { console.error("In-App ad error:", e); }
}

// WITHDRAW
withdrawBtn.addEventListener("click", async () => {
  try {
    const res = await fetch("/api/withdraw", {
      method: "POST",
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ telegram_id: TELEGRAM_ID })
    });
    const data = await res.json();
    if(data.error) alert("⚠️ " + data.error);
    else alert("💰 " + data.message);
  } catch(e) { console.error(e); }
});

// AUTO REFRESH USER BALANCE
async function refreshBalance() {
  try {
    const resp = await fetch("/api/leaderboard");
    const data = await resp.json();
    const me = data.find(u => u.username === TELEGRAM_ID);
    if(me) updateCoins(me.coins, me.balance || 0);
  } catch(e) { console.error(e); }
}
setInterval(refreshBalance, 15000); // every 15 sec
</script>
</body>
  </html>
