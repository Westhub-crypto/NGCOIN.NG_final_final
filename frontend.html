<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NGCoin Mini Game</title>
  <script src="//libtl.com/sdk.js" data-zone="10677338" data-sdk="show_10677338"></script>
</head>
<body>
  <h1>NGCoin Tap Game</h1>
  <p>Coins: <span id="coins">0</span></p>
  <button onclick="tap(false)">Tap</button>
  <button onclick="watchAd()">Watch Ad</button>

  <script>
    const telegram_id = "test_user"; // replace dynamically in real app
    const coinsEl = document.getElementById("coins");

    async function tap(ad=false){
      const res = await fetch("/api/tap", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({telegram_id, adWatched: ad})
      });
      const data = await res.json();
      if(data.success){
        coinsEl.textContent = data.coins + " (+" + (data.coinsPerTap + (ad?data.adBonus:0)) + ")";
      }else{
        alert(data.error);
      }
    }

    function watchAd(){
      show_10677338().then(()=>{
        alert("Ad completed! You got bonus coins!");
        tap(true);
      }).catch(e=>{
        console.log("Ad error", e);
      });
    }
  </script>
</body>
</html>
